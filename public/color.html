<!DOCTYPE html>
<html>
<head>
	<title>COP 4331 LAMP Stack Demo</title>
	<script type="text/javascript" src="js/code.js"></script>
    <link href="css/styles.css" rel="stylesheet">	
    <link href="https://fonts.googleapis.com/css?family=Ubuntu" rel="stylesheet">
	
	<script type="text/javascript">
	document.addEventListener('DOMContentLoaded', function() 
	{
		readCookie();
	}, false);
	</script>
	
</head>
<body>

<h1 id="title">COP 4331 LAMP Stack Demo</h1>

<div id="logged-in-div">
	<span id="user-name"></span><br />
	<button type="button" id="logout-button" class="buttons" onclick="doLogout();"> Log Out </button>
</div>

<div id="access-ui-div">
	<br />

	<input type="text" id="search-text" placeholder="Color To Search For"/>
	<button type="button" id="search-color-button" class="buttons" onclick="searchColor();"> Search Color </button><br />
	<span id="color-search-result"></span>
	<p id="color-list">
	</p><br /><br />

	<input type="text" id="color-text" placeholder="Color To Add">
	<button type="button" id="add-color-button" class="buttons" onclick="addColor();"> Add Color </button><br />
	<span id="color-add-result"></span>
</div>

</body>
</html>
